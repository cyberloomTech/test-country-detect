<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Country Detector</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        .emoji {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
        }
        .info-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            border-left: 4px solid #667eea;
        }
        .label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }
        .value {
            font-size: 20px;
            color: #333;
            font-weight: 600;
        }
        .loading {
            text-align: center;
            color: #666;
            padding: 40px;
        }
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="emoji">🌍</div>
        <h1>Country Detector</h1>
        
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <div>Detecting your location...</div>
        </div>
        
        <div id="result" style="display: none;">
            <div class="info-box">
                <div class="label">IP Address</div>
                <div class="value" id="ip">-</div>
            </div>
            
            <div class="info-box">
                <div class="label">Country</div>
                <div class="value" id="country">-</div>
            </div>
            
            <div class="info-box">
                <div class="label">Language Code</div>
                <div class="value" id="language">-</div>
            </div>
        </div>

        <div id="error" style="display: none;" class="error">
            Failed to detect location. Please try again.
        </div>
    </div>

    <script>
        fetch('/api/detect.php')
            .then(response => response.json())
            .then(data => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('result').style.display = 'block';
                document.getElementById('ip').textContent = data.ip;
                document.getElementById('country').textContent = data.countryName + ' (' + data.countryCode + ')';
                document.getElementById('language').textContent = data.language;
            })
            .catch(error => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                console.error('Error:', error);
            });
    </script>
</body>
</html>
